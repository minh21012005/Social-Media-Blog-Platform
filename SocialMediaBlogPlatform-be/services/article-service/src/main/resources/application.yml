server:
  port: 8082

spring:
  application:
    name: article-service
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties],optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${ARTICLE_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/social_blog_articles}
    username: ${ARTICLE_SERVICE_DB_USERNAME:social_blog}
    password: ${ARTICLE_SERVICE_DB_PASSWORD:social_blog}
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: ${ARTICLE_MEDIA_MAX_FILE_SIZE:10MB}
      max-request-size: ${ARTICLE_MEDIA_MAX_REQUEST_SIZE:10MB}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

outbox:
  relay:
    topic: article.events
    batch-size: ${OUTBOX_RELAY_BATCH_SIZE:100}
    fixed-delay-ms: ${OUTBOX_RELAY_FIXED_DELAY_MS:5000}

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS:127.0.0.1}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  article-folder: ${CLOUDINARY_ARTICLE_FOLDER:social-blog/articles}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId}]"

trending:
  job:
    cron: "${TRENDING_JOB_CRON:0 */15 * * * *}"
    page-size: ${TRENDING_JOB_PAGE_SIZE:200}
  cache:
    ttl-minutes: ${TRENDING_CACHE_TTL_MINUTES:20}
