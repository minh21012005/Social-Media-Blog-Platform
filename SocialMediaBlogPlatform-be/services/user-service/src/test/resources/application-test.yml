spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:h2:mem:user_service_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    enabled: false

security:
  jwt:
    issuer: social-media-blog-platform-test
    key-id: social-blog-test
    private-key-path: ./config/jwt/dev-private-key.pem
    public-key-path: ./config/jwt/dev-public-key.pem
    access-token-ttl: 15m
    refresh-token-ttl: 7d
  refresh-cookie:
    name: refresh_token
    path: /api/v1/auth
    secure: false
    same-site: Lax
