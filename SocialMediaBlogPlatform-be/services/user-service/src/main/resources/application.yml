server:
  port: 8081

spring:
  application:
    name: user-service
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties],optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${USER_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/social_blog_users}
    username: ${USER_SERVICE_DB_USERNAME:social_blog}
    password: ${USER_SERVICE_DB_PASSWORD:social_blog}
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: ${USER_AVATAR_MAX_FILE_SIZE:5MB}
      max-request-size: ${USER_AVATAR_MAX_REQUEST_SIZE:5MB}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    issuer: ${JWT_ISSUER:social-media-blog-platform}
    key-id: ${JWT_KEY_ID:social-blog-local-dev}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:./SocialMediaBlogPlatform-be/config/jwt/dev-private-key.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:./SocialMediaBlogPlatform-be/config/jwt/dev-public-key.pem}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}
  refresh-cookie:
    name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
    path: ${REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
    secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
    same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS:127.0.0.1}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  avatar-folder: ${CLOUDINARY_AVATAR_FOLDER:social-blog/avatars}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId}]"
