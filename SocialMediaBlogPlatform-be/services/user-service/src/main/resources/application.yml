server:
  port: 8081

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${USER_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/social_blog_users}
    username: ${USER_SERVICE_DB_USERNAME:social_blog}
    password: ${USER_SERVICE_DB_PASSWORD:social_blog}
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    issuer: ${JWT_ISSUER:social-media-blog-platform}
    secret: ${JWT_SECRET:local-development-jwt-secret-change-me-please}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
