services:
  postgres:
    image: postgres:16-alpine
    container_name: social-blog-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-social_blog_users}
      POSTGRES_USER: ${POSTGRES_USER:-social_blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-social_blog}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: social-blog-kafka
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: social-blog-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: infra/config-server
    container_name: social-blog-config-server
    ports:
      - "127.0.0.1:8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: infra/discovery-server
    container_name: social-blog-discovery-server
    ports:
      - "127.0.0.1:8761:8761"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - config-server

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: infra/api-gateway
    container_name: social-blog-api-gateway
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-api-gateway
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      - config-server
      - discovery-server

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: services/user-service
    container_name: social-blog-user-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-user-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/social_blog_users
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-social_blog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-social_blog}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-configured}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_AVATAR_FOLDER: ${CLOUDINARY_AVATAR_FOLDER:-social-blog/avatars}
      REFRESH_TOKEN_COOKIE_SECURE: ${REFRESH_TOKEN_COOKIE_SECURE:-false}
      REFRESH_TOKEN_COOKIE_SAME_SITE: ${REFRESH_TOKEN_COOKIE_SAME_SITE:-Lax}
    depends_on:
      - postgres
      - config-server
      - discovery-server

  article-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: services/article-service
    container_name: social-blog-article-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-article-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/social_blog_articles
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-social_blog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-social_blog}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_ARTICLE_FOLDER: ${CLOUDINARY_ARTICLE_FOLDER:-social-blog/articles}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - kafka
      - redis
      - config-server
      - discovery-server

  comment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: services/comment-service
    container_name: social-blog-comment-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-comment-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/social_blog_comments
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-social_blog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-social_blog}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
      - config-server
      - discovery-server

  interaction-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: services/interaction-service
    container_name: social-blog-interaction-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-interaction-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/social_blog_interactions
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-social_blog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-social_blog}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
      - config-server
      - discovery-server

  follower-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: services/follower-service
    container_name: social-blog-follower-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-follower-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/social_blog_followers
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-social_blog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-social_blog}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
      - config-server
      - discovery-server

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: services/notification-service
    container_name: social-blog-notification-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-notification-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/social_blog_notifications
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-social_blog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-social_blog}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
      - config-server
      - discovery-server

  websocket-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_PATH: services/websocket-service
    container_name: social-blog-websocket-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: social-blog-websocket-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      - kafka
      - redis
      - config-server
      - discovery-server

volumes:
  postgres_data:
  kafka_data:
  redis_data:
