services:
  postgres:
    image: postgres:16-alpine
    container_name: social-blog-postgres
    environment:
      POSTGRES_DB: social_blog_users
      POSTGRES_USER: social_blog
      POSTGRES_PASSWORD: social_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_blog -d social_blog_users"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
