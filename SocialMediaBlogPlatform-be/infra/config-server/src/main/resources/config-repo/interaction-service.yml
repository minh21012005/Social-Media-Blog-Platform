# ============================================================
# interaction-service — Service-specific configuration
# ============================================================

spring:
  datasource:
    url: ${INTERACTION_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/social_blog_interactions}
    username: ${INTERACTION_SERVICE_DB_USERNAME:social_blog}
    password: ${INTERACTION_SERVICE_DB_PASSWORD:social_blog}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

outbox:
  relay:
    topic: interaction.events
