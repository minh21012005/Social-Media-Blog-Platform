# ============================================================
# user-service — Service-specific configuration
# ============================================================

spring:
  datasource:
    url: ${USER_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/social_blog_users}
    username: ${USER_SERVICE_DB_USERNAME:social_blog}
    password: ${USER_SERVICE_DB_PASSWORD:social_blog}
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${USER_AVATAR_MAX_FILE_SIZE:5MB}
      max-request-size: ${USER_AVATAR_MAX_REQUEST_SIZE:5MB}

# user-service is the ONLY service that holds the private key (for signing tokens)
security:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:./config/jwt/dev-private-key.pem}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  avatar-folder: ${CLOUDINARY_AVATAR_FOLDER:social-blog/avatars}
