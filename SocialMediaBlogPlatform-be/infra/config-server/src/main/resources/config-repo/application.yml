# ============================================================
# GLOBAL — Shared configuration for ALL microservices
# ============================================================

# --- Platform ---
social-media-blog-platform:
  platform:
    name: social-media-blog-platform

# --- Security / JWT (read-only: used by all services to validate tokens) ---
security:
  jwt:
    issuer: ${JWT_ISSUER:social-media-blog-platform}
    key-id: ${JWT_KEY_ID:social-blog-local-dev}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:./config/jwt/dev-public-key.pem}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}
  refresh-cookie:
    name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
    path: ${REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
    secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
    same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}

# --- CORS ---
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Logging ---
logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId}]"

# --- Eureka (instance-id resolved per service via spring.application.name and server.port) ---
eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS:127.0.0.1}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info

# --- JPA (shared defaults; services with no DB simply won't use these) ---
spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

# --- Outbox Relay (shared defaults; each service overrides 'topic') ---
outbox:
  relay:
    batch-size: ${OUTBOX_RELAY_BATCH_SIZE:100}
    fixed-delay-ms: ${OUTBOX_RELAY_FIXED_DELAY_MS:5000}

