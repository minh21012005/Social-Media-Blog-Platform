server:
  port: 8888

spring:
  application:
    name: config-server
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties]
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo

management:
  endpoints:
    web:
      exposure:
        include: health,info
