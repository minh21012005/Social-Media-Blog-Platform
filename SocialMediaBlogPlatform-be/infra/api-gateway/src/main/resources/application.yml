server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties],optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**
            - id: comment-service-article-comments
              uri: lb://comment-service
              predicates:
                - Path=/api/v1/articles/*/comments,/api/v1/articles/*/comments/**
            - id: article-service
              uri: lb://article-service
              predicates:
                - Path=/api/v1/articles/**
            - id: comment-service
              uri: lb://comment-service
              predicates:
                - Path=/api/v1/comments/**
            - id: interaction-service
              uri: lb://interaction-service
              predicates:
                - Path=/api/v1/interactions/**
            - id: follower-service
              uri: lb://follower-service
              predicates:
                - Path=/api/v1/follows/**,/api/v1/followers/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
            - id: websocket-service
              uri: lb:ws://websocket-service
              predicates:
                - Path=/ws/**
            - id: websocket-service-api
              uri: lb://websocket-service
              predicates:
                - Path=/api/v1/presence/**

security:
  jwt:
    issuer: ${JWT_ISSUER:social-media-blog-platform}
    key-id: ${JWT_KEY_ID:social-blog-local-dev}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:./SocialMediaBlogPlatform-be/config/jwt/dev-public-key.pem}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId}]"

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS:127.0.0.1}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
