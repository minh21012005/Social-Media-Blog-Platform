server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:file:.env[.properties],optional:file:../../.env[.properties],optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**
            - id: article-service
              uri: lb://article-service
              predicates:
                - Path=/api/v1/articles/**
            - id: comment-service
              uri: lb://comment-service
              predicates:
                - Path=/api/v1/comments/**
            - id: interaction-service
              uri: lb://interaction-service
              predicates:
                - Path=/api/v1/interactions/**
            - id: follower-service
              uri: lb://follower-service
              predicates:
                - Path=/api/v1/follows/**,/api/v1/followers/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**

security:
  jwt:
    issuer: ${JWT_ISSUER:social-media-blog-platform}
    key-id: ${JWT_KEY_ID:social-blog-local-dev}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:./config/jwt/dev-public-key.pem}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
