server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service-users
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
            - id: article-service
              uri: lb://article-service
              predicates:
                - Path=/api/v1/articles/**

security:
  jwt:
    issuer: ${JWT_ISSUER:social-media-blog-platform}
    secret: ${JWT_SECRET:local-development-jwt-secret-change-me-please}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
